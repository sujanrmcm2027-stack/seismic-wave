name: Update Road Status

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-infra-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch road status from DOR & write JSON
        run: |
          set -euo pipefail

          TODAY=$(TZ="Asia/Kathmandu" date +%Y-%m-%d)
          NPT_NOW=$(TZ="Asia/Kathmandu" date "+%Y-%m-%d %H:%M NPT")

          echo "Fetching DOR advisory for $TODAY ..."

          # Try the DOR advisory endpoint
          HTTP_CODE=$(curl -s -o /tmp/dor_raw.json -w "%{http_code}" \
            -H "Accept: application/json" \
            "https://navigate.dor.gov.np/test_app/api/advisories/road_bridge_closure_alert/bh_dt/$TODAY" \
            --max-time 15 || echo "000")

          # Check if we got real JSON (not the Angular SPA HTML fallback)
          IS_JSON=false
          if [ "$HTTP_CODE" = "200" ]; then
            FIRST_CHAR=$(head -c 1 /tmp/dor_raw.json)
            if [ "$FIRST_CHAR" = "[" ] || [ "$FIRST_CHAR" = "{" ]; then
              IS_JSON=true
            fi
          fi

          if [ "$IS_JSON" = "true" ]; then
            echo "✅ DOR API returned JSON — parsing ..."
            python3 -c "import sys, textwrap; exec(textwrap.dedent(sys.stdin.read()))" <<'PYEOF'
          import json, sys, os

          with open("/tmp/dor_raw.json") as f:
              raw = json.load(f)

          npt_now = os.environ.get("NPT_NOW", "")
          roads = []

          # DOR data shape varies — handle both list and dict
          items = raw if isinstance(raw, list) else raw.get("data", [])
          for item in items:
              status_raw = str(item.get("status", "partial")).lower()
              if "close" in status_raw:
                  status = "closed"
              elif "partial" in status_raw or "open" in status_raw:
                  status = "partial" if "partial" in status_raw else "open"
              else:
                  status = "partial"
              roads.append({
                  "category": "road",
                  "name": item.get("road_name") or item.get("name") or "",
                  "nameNe": item.get("name_ne") or "",
                  "status": status,
                  "detail": item.get("detail") or item.get("closure_reason") or "",
                  "lastUpdated": npt_now,
              })

          print(f"Parsed {len(roads)} roads from DOR")
          with open("/tmp/parsed_roads.json", "w") as f:
              json.dump(roads, f)
          PYEOF
            ROADS_FROM_DOR=$(cat /tmp/parsed_roads.json)
          else
            echo "⚠️  DOR API unavailable (HTTP $HTTP_CODE / not JSON) — using curated fallback"
            # Curated fallback — update these when road conditions change
            # Last verified: 2026-07-19 from navigate.dor.gov.np
            ROADS_FROM_DOR='[]'
          fi

          # Build full infra JSON (roads from DOR if available, fallback otherwise)
          python3 -c "import sys, textwrap; exec(textwrap.dedent(sys.stdin.read()))" <<PYEOF
          import json, os

          npt_now = "$NPT_NOW"
          roads_from_dor = json.loads(r"""$ROADS_FROM_DOR""")

          # Curated fallback roads (used when DOR API is unreachable)
          # ⚠️  Update this list whenever DOR shows different road statuses
          fallback_roads = [
              {"category": "road", "name": "NH01 – Mahendra Rajmarg",          "nameNe": "महेन्द्र राजमार्ग",          "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH02 – Mechi Rajmarg",             "nameNe": "मेची राजमार्ग",              "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH03 – Puspalal Hwy (Mid-Hill)",   "nameNe": "पुष्पलाल राजमार्ग",         "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH04 – Birtamod-Chandragadhi",     "nameNe": "विर्तामोड–चन्द्रगढी",        "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH05 – Postal Hwy",                "nameNe": "हुलाकी राजमार्ग",           "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH06 – Koshi Rajmarg",             "nameNe": "कोशी राजमार्ग",             "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH08 – Sagarmatha Rajmarg",        "nameNe": "सगरमाथा राजमार्ग",          "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH09 – Madan Bhandari Hwy",        "nameNe": "मदन भण्डारी राजमार्ग",      "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH10 – Siddhartha Hwy",            "nameNe": "सिद्धार्थ राजमार्ग",         "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH11 – Rapti Rajmarg",             "nameNe": "राप्ती राजमार्ग",           "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH12 – Ratna Rajmarg",             "nameNe": "रत्न राजमार्ग",             "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH13 – Karnali Rajmarg",           "nameNe": "कर्णाली राजमार्ग",          "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH14 – Mahakali Rajmarg",          "nameNe": "महाकाली राजमार्ग",          "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH15 – Seti Rajmarg",              "nameNe": "सेती राजमार्ग",             "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH16 – Rapti-Lumbini Hwy",         "nameNe": "राप्ती-लुम्बिनी",           "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH34 – Araniko Hwy",               "nameNe": "अरनिको राजमार्ग",           "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH38 – BP Hwy",                    "nameNe": "बीपी राजमार्ग",             "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH41 – Tribhuvan Hwy",             "nameNe": "त्रिभुवन राजमार्ग",         "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH42 – Prithvi Hwy",               "nameNe": "पृथ्वी राजमार्ग",           "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "road", "name": "NH43 – Narayanghat-Mugling",       "nameNe": "नारायणगढ–मुग्लिन",          "status": "open", "detail": "", "lastUpdated": npt_now},
          ]

          # Realtime Highway API (Primary: BIPAD, Secondary: Google News)
          import urllib.request, urllib.parse, json, xml.etree.ElementTree as ET
          try:
              bipad_req = urllib.request.Request("https://bipadportal.gov.np/api/v1/highway/?limit=100", headers={"User-Agent": "Mozilla/5.0"})
              bipad_res = urllib.request.urlopen(bipad_req, timeout=10)
              bipad_data = json.loads(bipad_res.read())
              results = bipad_data.get("results", [])
              
              if len(results) > 0:
                  for incident in results:
                      if incident["status"] == "OPEN": continue
                      inc_title = incident["title"].lower()
                      inc_ref = (incident.get("roadRefno") or "").lower()
                      
                      for r in fallback_roads:
                          r_name = r["name"].lower()
                          nh_code = r_name.split(" ")[0].replace("–", "").strip()
                          is_match = (nh_code == inc_ref)
                          if not is_match:
                              keywords = [w for w in r_name.replace("–", "").split(" ") if len(w) > 4 and w not in ["highway", "rajmarg"]]
                              if any(kw in inc_title for kw in keywords): is_match = True
                                  
                          if is_match:
                              r["status"] = "closed" if incident["status"] == "CLOSED" else "partial"
                              r["detail"] = f"{incident.get('closureReason', 'Blocked')} at {incident.get('location', '')}".strip()
              else:
                  raise Exception("BIPAD returned empty results")
          except Exception as e:
              print(f"BIPAD API failed ({e}), falling back to Google News...")
              try:
                  query = urllib.parse.quote("Nepal AND (highway OR road OR landslide OR blocked)")
                  url = f"https://news.google.com/rss/search?q={query}&hl=en-US&gl=US&ceid=US:en"
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  res = urllib.request.urlopen(req, timeout=10)
                  root = ET.fromstring(res.read())
                  news_text = " ".join([item.find("title").text.lower() for item in root.findall(".//item")]).lower()
                  
                  for r in fallback_roads:
                      name_lower = r["name"].lower().replace("hwy", "highway")
                      if "prithvi" in name_lower and "prithvi" in news_text:
                          r["status"] = "partial"
                          r["detail"] = "Reported issues in news (Fallback)"
                      elif "karnali" in name_lower and "karnali" in news_text:
                          r["status"] = "closed"
                          r["detail"] = "Blocked by landslide (Fallback)"
                      elif any(kw in name_lower for kw in ["araniko", "tribhuvan", "bp "]) and any(kw in news_text for kw in ["araniko", "tribhuvan", "bp "]):
                          r["status"] = "partial"
                          r["detail"] = "Traffic disruption reported (Fallback)"
              except Exception as fallback_e:
                  print("Both BIPAD and Google News fallback failed", fallback_e)

          airports = [
              {"category": "airport", "name": "Tribhuvan Intl (KTM)",      "icao": "VNKT", "nameNe": "त्रिभुवन अन्तर्राष्ट्रिय",  "status": "open", "detail": "Normal operations", "lastUpdated": npt_now},
              {"category": "airport", "name": "Gautam Buddha Intl (BWA)",  "icao": "VNBW", "nameNe": "गौतम बुद्ध विमानस्थल",      "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "airport", "name": "Pokhara Regional (PKR)",    "icao": "VNPK", "nameNe": "पोखरा विमानस्थल",           "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "airport", "name": "Bharatpur (BHR)",            "icao": "VNBP", "nameNe": "भरतपुर विमानस्थल",          "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "airport", "name": "Dhangadhi (DHI)",            "icao": "VNDH", "nameNe": "धनगढी विमानस्थल",           "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "airport", "name": "Biratnagar (BIR)",           "icao": "VNVT", "nameNe": "विराटनगर विमानस्थल",        "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "airport", "name": "Nepalgunj (KEP)",            "icao": "VNNG", "nameNe": "नेपालगञ्ज विमानस्थल",       "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "airport", "name": "Chandragadhi (BDP)",         "icao": "VNCG", "nameNe": "चन्द्रगढी विमानस्थल",       "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "airport", "name": "Janakpur (JKR)",             "icao": "VNJP", "nameNe": "जनकपुर विमानस्थल",          "status": "open", "detail": "", "lastUpdated": npt_now},
              {"category": "airport", "name": "Simara (SIF)",               "icao": "VNSI", "nameNe": "सिमरा विमानस्थल",           "status": "open", "detail": "", "lastUpdated": npt_now},
          ]

          # Realtime News API & NOAA METAR Aero-Meteorological Data
          try:
              # 1. Fetch NOAA METAR data for all ICAO codes
              icao_list = ",".join([a["icao"] for a in airports])
              metar_url = f"https://aviationweather.gov/api/data/metar?ids={icao_list}&format=json&hours=1"
              req_metar = urllib.request.Request(metar_url, headers={"User-Agent": "Mozilla/5.0"})
              res_metar = urllib.request.urlopen(req_metar, timeout=10)
              metar_data = json.loads(res_metar.read())
              
              metar_dict = {m.get("icaoId"): m for m in metar_data}
              
              # 2. Fetch Google News RSS for disruptions
              query_air = urllib.parse.quote("Nepal AND (airport OR flight OR TIA) AND (closed OR cancelled OR delayed OR suspended) when:1d")
              url_air = f"https://news.google.com/rss/search?q={query_air}&hl=en-US&gl=US&ceid=US:en"
              req_air = urllib.request.Request(url_air, headers={"User-Agent": "Mozilla/5.0"})
              res_air = urllib.request.urlopen(req_air, timeout=10)
              root_air = ET.fromstring(res_air.read())
              air_news_text = " ".join([item.find("title").text.lower() for item in root_air.findall(".//item")]).lower()
              
              for a in airports:
                  has_issue = False
                  icao = a["icao"]
                  
                  # Apply METAR Weather
                  if icao in metar_dict:
                      m = metar_dict[icao]
                      cat = m.get("fltcat", "VFR")
                      if cat in ["IFR", "LIFR"]:
                          a["status"] = "partial"
                          a["detail"] = f"Low visibility ({cat})"
                          has_issue = True
                      elif cat == "MVFR" and m.get("wspd") and m.get("wspd", 0) > 25:
                          a["status"] = "partial"
                          a["detail"] = f"High winds ({m.get('wspd')}kt)"
                          has_issue = True

                  # Apply News Disruption (Overrides Weather)
                  if "tribhuvan" in a["name"].lower() or "ktm" in a["name"].lower():
                      if any(kw in air_news_text for kw in ["tribhuvan", "tia", "kathmandu airport"]):
                          if "closed" in air_news_text or "suspended" in air_news_text:
                              a["status"] = "closed"
                              a["detail"] = "Reported closed in news"
                              has_issue = True
                          elif "delayed" in air_news_text or "cancelled" in air_news_text:
                              a["status"] = "partial"
                              if not has_issue: a["detail"] = "Flights delayed/cancelled"
                              has_issue = True
                  else:
                      city = a["name"].split()[0].lower()
                      if city in air_news_text:
                          a["status"] = "partial"
                          a["detail"] = "Disruptions reported in news"
                          has_issue = True
                  
                  # Cleanup
                  del a["icao"]
          except Exception as e:
              print("Airport fallback failed", e)

          hospitals = [
              {"category": "hospital", "name": "Bir Hospital, Kathmandu",           "nameNe": "बीर अस्पताल",              "status": "open", "detail": "120 beds", "beds": 120, "bedsTotal": 390, "lastUpdated": npt_now},
              {"category": "hospital", "name": "TU Teaching Hospital, KTM",         "nameNe": "त्रिवि शिक्षण अस्पताल",    "status": "open", "detail": "95 beds", "beds": 95, "bedsTotal": 600, "lastUpdated": npt_now},
              {"category": "hospital", "name": "Patan Hospital, Lalitpur",          "nameNe": "पाटन अस्पताल",             "status": "open", "detail": "60 beds", "beds": 60, "bedsTotal": 300, "lastUpdated": npt_now},
              {"category": "hospital", "name": "Manipal College Hospital, PKR",     "nameNe": "मणिपाल अस्पताल",           "status": "open", "detail": "45 beds", "beds": 45, "bedsTotal": 150, "lastUpdated": npt_now},
              {"category": "hospital", "name": "Gandaki Medical College, PKR",      "nameNe": "गण्डकी अस्पताल",           "status": "open", "detail": "38 beds", "beds": 38, "bedsTotal": 200, "lastUpdated": npt_now},
              {"category": "hospital", "name": "BPKIHS, Dharan",                    "nameNe": "बीपी कोइराला स्वास्थ्य",   "status": "open", "detail": "150 beds", "beds": 150, "bedsTotal": 600, "lastUpdated": npt_now},
              {"category": "hospital", "name": "Koshi Hospital, Biratnagar",        "nameNe": "कोशी अस्पताल",             "status": "open", "detail": "80 beds", "beds": 80, "bedsTotal": 350, "lastUpdated": npt_now},
              {"category": "hospital", "name": "Bheri Hospital, Nepalgunj",         "nameNe": "भेरी अस्पताल",             "status": "open", "detail": "70 beds", "beds": 70, "bedsTotal": 200, "lastUpdated": npt_now},
              {"category": "hospital", "name": "Chitwan Medical College",           "nameNe": "चितवन मेडिकल कलेज",        "status": "open", "detail": "100 beds", "beds": 100, "bedsTotal": 400, "lastUpdated": npt_now},
              {"category": "hospital", "name": "Lumbini Provincial Hospital",       "nameNe": "लुम्बिनी प्रादेशिक",       "status": "open", "detail": "110 beds", "beds": 110, "bedsTotal": 380, "lastUpdated": npt_now},
          ]

          roads = roads_from_dor if roads_from_dor else fallback_roads

          payload = {
              "generatedAt": npt_now,
              "source": "DOR Nepal (navigate.dor.gov.np)" if roads_from_dor else "Curated fallback — DOR API unavailable",
              "items": roads + airports + hospitals,
          }

          with open("public/infra_status.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)

          closed  = sum(1 for r in roads if r["status"] == "closed")
          partial = sum(1 for r in roads if r["status"] == "partial")
          opened  = sum(1 for r in roads if r["status"] == "open")
          print(f"Written public/infra_status.json — roads: {closed} closed / {partial} partial / {opened} open")
          PYEOF

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/infra_status.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update infra_status.json [$(TZ='Asia/Kathmandu' date '+%Y-%m-%d %H:%M NPT')]"
            git pull --rebase
            git push
          fi
